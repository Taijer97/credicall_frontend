services:
  app:
    build:
      context: .
      args:
        VITE_UGEL_API_URL: ${VITE_UGEL_API_URL}
        VITE_WHATSAPP_API_URL: ${VITE_WHATSAPP_API_URL}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_UGEL_API_URL: ${VITE_UGEL_API_URL}
      VITE_WHATSAPP_API_URL: ${VITE_WHATSAPP_API_URL}
